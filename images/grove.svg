<svg xmlns="http://www.w3.org/2000/svg" width="96" height="96" viewBox="0 0 96 96">
  <style>
    @keyframes leafPulse1 { 0%, 100% { opacity: 0.6; r: 4; } 50% { opacity: 1; r: 5; } }
    @keyframes leafPulse2 { 0%, 100% { opacity: 0.5; r: 3.5; } 50% { opacity: 1; r: 4.5; } }
    @keyframes sapFlow { 0% { stroke-dashoffset: 12; } 100% { stroke-dashoffset: 0; } }
    @keyframes rootGlow { 0%, 100% { stroke-opacity: 0.3; } 50% { stroke-opacity: 0.7; } }
    .leaf1 { animation: leafPulse1 2.5s ease-in-out infinite; transform-origin: 48px 22px; }
    .leaf2 { animation: leafPulse2 2.5s ease-in-out 0.6s infinite; transform-origin: 32px 35px; }
    .leaf3 { animation: leafPulse1 2.5s ease-in-out 1.2s infinite; transform-origin: 64px 35px; }
    .leaf4 { animation: leafPulse2 2.5s ease-in-out 0.3s infinite; transform-origin: 40px 28px; }
    .leaf5 { animation: leafPulse1 2.5s ease-in-out 0.9s infinite; transform-origin: 56px 28px; }
    .sap { animation: sapFlow 1.5s linear infinite; }
    .root { animation: rootGlow 3s ease-in-out infinite; }
  </style>
  <rect width="96" height="96" fill="#0a0a0a"/>
  <!-- Trunk -->
  <line x1="48" y1="75" x2="48" y2="40" stroke="#556b2f" stroke-width="2.5" stroke-linecap="round"/>
  <!-- Branches -->
  <line class="sap" x1="48" y1="45" x2="32" y2="35" stroke="#9ece6a" stroke-width="1.5" stroke-dasharray="3,3" stroke-linecap="round"/>
  <line class="sap" x1="48" y1="45" x2="64" y2="35" stroke="#9ece6a" stroke-width="1.5" stroke-dasharray="3,3" stroke-linecap="round"/>
  <line class="sap" x1="48" y1="40" x2="40" y2="28" stroke="#9ece6a" stroke-width="1.5" stroke-dasharray="3,3" stroke-linecap="round"/>
  <line class="sap" x1="48" y1="40" x2="56" y2="28" stroke="#9ece6a" stroke-width="1.5" stroke-dasharray="3,3" stroke-linecap="round"/>
  <line class="sap" x1="48" y1="38" x2="48" y2="22" stroke="#9ece6a" stroke-width="1.5" stroke-dasharray="3,3" stroke-linecap="round"/>
  <!-- Roots -->
  <line class="root" x1="48" y1="75" x2="36" y2="82" stroke="#556b2f" stroke-width="1" stroke-linecap="round"/>
  <line class="root" x1="48" y1="75" x2="60" y2="82" stroke="#556b2f" stroke-width="1" stroke-linecap="round"/>
  <!-- Leaf nodes -->
  <circle class="leaf1" cx="48" cy="22" r="4" fill="#CCF340" opacity="0.6"/>
  <circle class="leaf2" cx="32" cy="35" r="3.5" fill="#9ece6a" opacity="0.5"/>
  <circle class="leaf3" cx="64" cy="35" r="3.5" fill="#7aa2f7" opacity="0.5"/>
  <circle class="leaf4" cx="40" cy="28" r="3.5" fill="#e0af68" opacity="0.5"/>
  <circle class="leaf5" cx="56" cy="28" r="3.5" fill="#bb9af7" opacity="0.5"/>
  <!-- Inner dots -->
  <circle cx="48" cy="22" r="1.5" fill="#CCF340" opacity="0.8"/>
  <circle cx="32" cy="35" r="1.5" fill="#9ece6a" opacity="0.7"/>
  <circle cx="64" cy="35" r="1.5" fill="#7aa2f7" opacity="0.7"/>
  <circle cx="40" cy="28" r="1.5" fill="#e0af68" opacity="0.7"/>
  <circle cx="56" cy="28" r="1.5" fill="#bb9af7" opacity="0.7"/>
</svg>
