<svg xmlns="http://www.w3.org/2000/svg" width="96" height="96" viewBox="0 0 96 96">
  <style>
    @keyframes glyphPulse { 0%, 100% { opacity: 0.5; } 50% { opacity: 1; } }
    @keyframes orbitalFlow { 0% { stroke-dashoffset: 16; } 100% { stroke-dashoffset: 0; } }
    @keyframes reciprocity { 0%, 100% { opacity: 0.3; } 50% { opacity: 0.8; } }
    .glyph1 { animation: glyphPulse 2s ease-in-out infinite; }
    .glyph2 { animation: glyphPulse 2s ease-in-out 0.7s infinite; }
    .glyph3 { animation: glyphPulse 2s ease-in-out 1.4s infinite; }
    .orbit { animation: orbitalFlow 2s linear infinite; }
    .link { animation: reciprocity 3s ease-in-out infinite; }
  </style>
  <rect width="96" height="96" fill="#0a0a0a"/>
  <!-- Orbital ring -->
  <circle cx="48" cy="48" r="26" fill="none" stroke="#e0af68" stroke-width="1" stroke-dasharray="4,4" class="orbit"/>
  <!-- Central glyph - stylized A for Ayni -->
  <polygon points="48,26 40,46 56,46" fill="none" stroke="#e0af68" stroke-width="2"/>
  <line x1="43" y1="39" x2="53" y2="39" stroke="#e0af68" stroke-width="1.5"/>
  <!-- Agent nodes on orbit -->
  <g class="glyph1">
    <rect x="20" y="44" width="8" height="8" rx="1" fill="none" stroke="#9ece6a" stroke-width="1.5"/>
    <line x1="22" y1="47" x2="26" y2="47" stroke="#9ece6a" stroke-width="1"/>
    <line x1="22" y1="49" x2="25" y2="49" stroke="#9ece6a" stroke-width="1"/>
  </g>
  <g class="glyph2">
    <rect x="68" y="44" width="8" height="8" rx="1" fill="none" stroke="#7aa2f7" stroke-width="1.5"/>
    <line x1="70" y1="47" x2="74" y2="47" stroke="#7aa2f7" stroke-width="1"/>
    <line x1="70" y1="49" x2="73" y2="49" stroke="#7aa2f7" stroke-width="1"/>
  </g>
  <g class="glyph3">
    <rect x="44" y="66" width="8" height="8" rx="1" fill="none" stroke="#bb9af7" stroke-width="1.5"/>
    <line x1="46" y1="69" x2="50" y2="69" stroke="#bb9af7" stroke-width="1"/>
    <line x1="46" y1="71" x2="49" y2="71" stroke="#bb9af7" stroke-width="1"/>
  </g>
  <!-- Reciprocity arrows -->
  <line class="link" x1="28" y1="46" x2="40" y2="40" stroke="#9ece6a" stroke-width="0.8"/>
  <line class="link" x1="68" y1="46" x2="56" y2="40" stroke="#7aa2f7" stroke-width="0.8"/>
  <line class="link" x1="48" y1="66" x2="48" y2="50" stroke="#bb9af7" stroke-width="0.8"/>
</svg>
