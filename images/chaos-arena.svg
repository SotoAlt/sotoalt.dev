<svg xmlns="http://www.w3.org/2000/svg" width="96" height="96" viewBox="0 0 96 96">
  <style>
    @keyframes staffGlow { 0%, 100% { opacity: 0.6; } 50% { opacity: 1; } }
    @keyframes shapeRotate { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    @keyframes floatUp { 0%, 100% { transform: translateY(0); opacity: 0.7; } 50% { transform: translateY(-3px); opacity: 1; } }
    @keyframes sparkle { 0%, 100% { opacity: 0; r: 1; } 50% { opacity: 1; r: 1.5; } }
    .staff-glow { animation: staffGlow 2s ease-in-out infinite; }
    .shape1 { animation: floatUp 2s ease-in-out infinite; transform-origin: 68px 28px; }
    .shape2 { animation: floatUp 2.5s ease-in-out 0.4s infinite; transform-origin: 22px 32px; }
    .shape3 { animation: floatUp 2s ease-in-out 0.8s infinite; transform-origin: 72px 52px; }
    .spin { animation: shapeRotate 6s linear infinite; transform-origin: 68px 28px; }
    .spark1 { animation: sparkle 1.5s ease-in-out infinite; }
    .spark2 { animation: sparkle 1.5s ease-in-out 0.5s infinite; }
    .spark3 { animation: sparkle 1.5s ease-in-out 1s infinite; }
  </style>
  <rect width="96" height="96" fill="#0a0a0a"/>
  <!-- Wizard hat -->
  <polygon points="42,22 48,10 54,22" fill="#bb9af7" opacity="0.8"/>
  <line x1="42" y1="22" x2="54" y2="22" stroke="#bb9af7" stroke-width="1.5"/>
  <!-- Hat brim -->
  <ellipse cx="48" cy="23" rx="10" ry="2.5" fill="none" stroke="#bb9af7" stroke-width="1"/>
  <!-- Face area hint -->
  <circle cx="48" cy="30" r="6" fill="none" stroke="#555" stroke-width="0.8"/>
  <circle cx="46" cy="29" r="1" fill="#bb9af7" opacity="0.7"/>
  <circle cx="50" cy="29" r="1" fill="#bb9af7" opacity="0.7"/>
  <!-- Staff -->
  <line x1="34" y1="26" x2="28" y2="78" stroke="#888" stroke-width="2" stroke-linecap="round"/>
  <circle class="staff-glow" cx="34" cy="24" r="3" fill="#bb9af7" opacity="0.6"/>
  <!-- Floating chaos shapes -->
  <g class="spin">
    <rect class="shape1" x="63" y="23" width="10" height="10" fill="none" stroke="#f7768e" stroke-width="1.5" rx="1"/>
  </g>
  <g class="shape2">
    <polygon points="22,26 18,38 26,38" fill="none" stroke="#e0af68" stroke-width="1.5"/>
  </g>
  <g class="shape3">
    <circle cx="72" cy="52" r="5" fill="none" stroke="#7aa2f7" stroke-width="1.5"/>
  </g>
  <!-- Chaos energy lines -->
  <line x1="37" y1="24" x2="60" y2="28" stroke="#f7768e" stroke-width="0.5" opacity="0.4" stroke-dasharray="2,3"/>
  <line x1="37" y1="24" x2="22" y2="32" stroke="#e0af68" stroke-width="0.5" opacity="0.4" stroke-dasharray="2,3"/>
  <line x1="37" y1="24" x2="70" y2="50" stroke="#7aa2f7" stroke-width="0.5" opacity="0.4" stroke-dasharray="2,3"/>
  <!-- Sparkles -->
  <circle class="spark1" cx="58" cy="18" r="1" fill="#f7768e"/>
  <circle class="spark2" cx="76" cy="40" r="1" fill="#bb9af7"/>
  <circle class="spark3" cx="16" cy="44" r="1" fill="#e0af68"/>
</svg>
